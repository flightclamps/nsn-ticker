<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>NSN AI · SportsCenter Ticker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,800;0,900;1,900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body { background:#050505; color:#fff; font-family:'Inter',sans-serif; min-height:100vh; min-height:-webkit-fill-available; -webkit-text-size-adjust:100%; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:#111; }
    ::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
    @keyframes ticker-scroll { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
    @keyframes pulse-dot { 0%,100% { opacity:1; box-shadow:0 0 8px #00ff88; } 50% { opacity:0.3; box-shadow:none; } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes flash { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  </style>
</head>
<body>
<div id="app"></div>
<script>
/* ── Badge config ── */
const BADGE = {
  LIVE:      { color:'#00ff88', flash:true  },
  FINAL:     { color:'#aaaaaa', flash:false },
  TONIGHT:   { color:'#4488ff', flash:false },
  BREAKING:  { color:'#ff4444', flash:true  },
  PREDICTED: { color:'#bb44ff', flash:false },
  INJURY:    { color:'#ff8800', flash:false },
  ROSTER:    { color:'#00ccaa', flash:false },
  VEGAS:     { color:'#FFD700', flash:false },
  WATCH:     { color:'#ffcc00', flash:false },
  WEATHER:   { color:'#44aaff', flash:false },
  REVENGE:   { color:'#ff6644', flash:false },
  DFS:       { color:'#00cc66', flash:false },
  ROOKIE:    { color:'#00eeff', flash:false },
  SLUMP:     { color:'#ff3333', flash:false },
  HOT:       { color:'#ff6600', flash:true  },
  RANK:      { color:'#cc88ff', flash:false },
};

/* ── ESPN public JSON scoreboards (no proxy, CORS-open) ── */
const ESPN_SCORES = [
  { league:'NFL', url:'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard' },
  { league:'NBA', url:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard' },
  { league:'MLB', url:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard' },
  { league:'NHL', url:'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard' },
  { league:'CFB', url:'https://site.api.espn.com/apis/site/v2/sports/football/college-football/scoreboard' },
  { league:'CBB', url:'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard' },
  { league:'MLS', url:'https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/scoreboard' },
];

const ESPN_RANKINGS = [
  { label:'CFB', url:'https://site.web.api.espn.com/apis/v2/sports/football/college-football/rankings' },
  { label:'CBB', url:'https://site.web.api.espn.com/apis/v2/sports/basketball/mens-college-basketball/rankings' },
];

/* ── RSS feeds (via CORS proxy) ── */
const RSS_FEEDS = [
  { src:'ESPN',   url:'https://www.espn.com/espn/rss/news',                      max:5 },
  { src:'ESPN',   url:'https://www.espn.com/espn/rss/nfl/news',                  max:4 },
  { src:'ESPN',   url:'https://www.espn.com/espn/rss/nba/news',                  max:4 },
  { src:'ESPN',   url:'https://www.espn.com/espn/rss/mlb/news',                  max:4 },
  { src:'ESPN',   url:'https://www.espn.com/espn/rss/nhl/news',                  max:3 },
  { src:'ESPN',   url:'https://www.espn.com/espn/rss/ncf/news',                  max:3 },
  { src:'ESPN',   url:'https://www.espn.com/espn/rss/ncb/news',                  max:3 },
  { src:'ESPN',   url:'https://www.espn.com/espn/rss/soccer/news',               max:2 },
  { src:'YAHOO',  url:'https://sports.yahoo.com/rss/',                            max:5 },
  { src:'CBS',    url:'https://www.cbssports.com/rss/headlines/',                 max:4 },
  { src:'PFT',    url:'https://profootballtalk.nbcsports.com/feed/',              max:4 },
  { src:'HOOPS',  url:'https://hoopshype.com/feed/',                              max:4 },
  { src:'MLB',    url:'https://www.mlb.com/feeds/news/rss.xml',                   max:3 },
  { src:'ROTO',   url:'https://www.rotowire.com/updates/rss.php',                 max:6 },
  { src:'BR',     url:'https://bleacherreport.com/articles/feed',                 max:3 },
];

const SOURCE_LABELS = ['ESPN (8 FEEDS)','YAHOO SPORTS','CBS SPORTS','PRO FOOTBALL TALK','HOOPSHYPE','MLB.COM','ROTOWIRE','BLEACHER REPORT','ESPN SCOREBOARDS','AP POLLS'];

/* ── CORS proxy fallback chain ── */
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

async function proxyFetch(url) {
  for (const make of PROXIES) {
    try {
      const r = await fetch(make(url), { signal: AbortSignal.timeout(8000) });
      if (r.ok) return await r.text();
    } catch {}
  }
  return null;
}

/* ── Badge keyword detection ── */
function detectBadge(title, desc) {
  const t = (title + ' ' + (desc || '')).toLowerCase();
  if (/breaking|sources say|per sources|report:|sources:|per espn|per nfl|per nba|per mlb/.test(t))         return 'BREAKING';
  if (/injur|day-to-day|doubtful|questionable|sidelined|placed on il|placed on ir|out for|concussion|hamstring|ankle|knee|shoulder|surgery|activated from|returning from/.test(t)) return 'INJURY';
  if (/traded?|signed?|waived?|released?|acquired?|free agent|contract|extension|deal\b|claimed|waiver/.test(t)) return 'ROSTER';
  if (/odds|spread|moneyline|over\/under|line move|sharp money|prop bet|draftkings|fanduel|sportsbook/.test(t)) return 'VEGAS';
  if (/rain delay|wind advisory|postponed|rescheduled|cancelled|weather/.test(t))                             return 'WEATHER';
  if (/revenge game|returns? to|faces? former|playing against his former|ex-teammate/.test(t))               return 'REVENGE';
  if (/career.?high|franchise record|sets record|breaks record|all-time|consecutive|hit streak|on fire/.test(t)) return 'HOT';
  if (/slump|0-for|hitless|struggling|cold streak|benched|demoted|optioned/.test(t))                         return 'SLUMP';
  if (/rookie|first career|nfl debut|nba debut|mlb debut|first start\b/.test(t))                             return 'ROOKIE';
  if (/\bdfs\b|daily fantasy|ownership percentage|fade\b|gpp\b/.test(t))                                     return 'DFS';
  if (/tonight|today's game|preview|matchup|tip.?off|first pitch|puck drop|game day/.test(t))                return 'TONIGHT';
  if (/wins\b|defeats|beats\b|beat\b|topped|blanked|shutout|final:/.test(t))                                 return 'FINAL';
  return 'LIVE';
}

/* ── Text cleaner ── */
function clean(str) {
  if (!str) return '';
  return str
    .replace(/<[^>]+>/g, '')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/&nbsp;/g,' ')
    .replace(/\s+/g,' ').trim().toUpperCase().slice(0, 120);
}

/* ── Fetch ESPN scoreboards ── */
async function fetchScores() {
  const items = [];
  await Promise.allSettled(ESPN_SCORES.map(async ({ league, url }) => {
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(7000) });
      if (!r.ok) return;
      const data = await r.json();
      for (const ev of (data.events || []).slice(0, 6)) {
        const comp = ev?.competitions?.[0];
        const competitors = comp?.competitors || [];
        const home = competitors.find(c => c.homeAway === 'home');
        const away = competitors.find(c => c.homeAway === 'away');
        if (!home || !away) continue;
        const state  = ev?.status?.type?.state;
        const detail = (ev?.status?.type?.shortDetail || '').toUpperCase();
        const aN = (away.team?.abbreviation || away.team?.shortDisplayName || '').toUpperCase();
        const hN = (home.team?.abbreviation || home.team?.shortDisplayName || '').toUpperCase();
        const aS = away.score, hS = home.score;
        if (state === 'post' && aS != null) {
          const winner = parseInt(aS) > parseInt(hS) ? aN : hN;
          items.push({ badge:'FINAL',   line:`${league} · ${aN} ${aS} ${hN} ${hS} · ${winner} WIN` });
        } else if (state === 'in' && aS != null) {
          items.push({ badge:'LIVE',    line:`${league} · ${aN} ${aS} ${hN} ${hS} · ${detail}` });
        } else if (state === 'pre') {
          items.push({ badge:'TONIGHT', line:`${league} · ${aN} @ ${hN} · ${detail}` });
        }
      }
    } catch {}
  }));
  return items;
}

/* ── Fetch AP rankings ── */
async function fetchRankings() {
  const items = [];
  await Promise.allSettled(ESPN_RANKINGS.map(async ({ label, url }) => {
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(7000) });
      if (!r.ok) return;
      const data = await r.json();
      const poll = data?.rankings?.[0];
      if (!poll) return;
      const top5 = (poll.ranks || []).slice(0, 5)
        .map(rk => `#${rk.current} ${(rk.team?.abbreviation || rk.team?.shortDisplayName || '').toUpperCase()}`)
        .join(' · ');
      if (top5) items.push({ badge:'RANK', line:`${label} ${(poll.name||'AP TOP 25').toUpperCase()} · ${top5}` });
    } catch {}
  }));
  return items;
}

/* ── Fetch RSS feeds ── */
async function fetchNews() {
  const items = [], seen = new Set();
  await Promise.allSettled(RSS_FEEDS.map(async ({ url, max }) => {
    try {
      const text = await proxyFetch(url);
      if (!text) return;
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      for (const node of [...xml.querySelectorAll('item')].slice(0, max)) {
        const title = clean(node.querySelector('title')?.textContent);
        const desc  = clean(node.querySelector('description')?.textContent);
        if (!title || title.length < 10) continue;
        const key = title.slice(0, 55).replace(/\s+/g,'');
        if (seen.has(key)) continue;
        seen.add(key);
        items.push({ badge: detectBadge(title, desc), line: title });
      }
    } catch {}
  }));
  return items;
}

/* ── Sort by priority ── */
const PRI = { BREAKING:0, LIVE:1, INJURY:2, FINAL:3, ROSTER:4, VEGAS:5, TONIGHT:6, HOT:7, SLUMP:8, WEATHER:9, REVENGE:10, RANK:11, ROOKIE:12, DFS:13, PREDICTED:14, WATCH:15 };
const sortItems = arr => arr.slice().sort((a,b) => (PRI[a.badge]??99) - (PRI[b.badge]??99));

/* ── Render helpers ── */
function badgeHTML(badge) {
  const c = BADGE[badge] || { color:'#888', flash:false };
  return `<span style="font-size:10px;font-weight:800;letter-spacing:0.4px;color:${c.color};background:${c.color}1a;border:1px solid ${c.color}55;padding:3px 8px;border-radius:3px;white-space:nowrap;font-family:'Oswald',sans-serif;${c.flash?'animation:flash 1.2s ease-in-out infinite;':''}">${badge}</span>`;
}

function tickerItemHTML(it) {
  return `<div style="display:flex;align-items:center;height:100%;padding:0 20px;border-right:1px solid #1a1a1a;gap:12px;flex-shrink:0;white-space:nowrap;">${badgeHTML(it.badge)}<span style="font-size:13px;font-weight:600;color:#e8e8e8;">${it.line}</span><span style="color:#252525;font-size:16px;">·</span></div>`;
}

/* ── Build page skeleton ── */
function buildUI() {
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;min-height:100vh;background:#050505;">
      <div style="padding:12px 16px;background:#000;border-bottom:1px solid #111;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-weight:900;font-style:italic;font-size:20px;letter-spacing:-1px;">NSN <span style="color:#00ff88;">AI</span></span>
          <span style="font-size:9px;font-weight:700;color:#333;letter-spacing:1.5px;font-family:'Oswald',sans-serif;">LIVE TICKER</span>
        </div>
        <span id="ts" style="font-size:10px;color:#2a2a2a;font-weight:700;"></span>
      </div>

      <div style="height:52px;background:#000;border-bottom:3px solid #00ff88;display:flex;overflow:hidden;flex-shrink:0;">
        <div style="width:110px;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;background:#000;border-right:3px solid #00ff88;box-shadow:6px 0 20px rgba(0,0,0,0.9);z-index:10;">
          <div style="width:7px;height:7px;border-radius:50%;background:#00ff88;animation:pulse-dot 2s ease-in-out infinite;"></div>
          <span style="font-weight:900;font-style:italic;font-size:16px;letter-spacing:-1px;">NSN <span style="color:#00ff88;">AI</span></span>
        </div>
        <div style="flex:1;overflow:hidden;position:relative;display:flex;align-items:center;">
          <div style="position:absolute;right:0;top:0;bottom:0;width:60px;background:linear-gradient(to right,transparent,#000);pointer-events:none;z-index:5;"></div>
          <div id="tl" style="padding:0 20px;color:#444;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:600;">
            <div style="width:13px;height:13px;border:2px solid #222;border-top-color:#00ff88;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
            LOADING ${RSS_FEEDS.length + ESPN_SCORES.length} SOURCES...
          </div>
          <div id="tt" style="display:none;height:100%;"></div>
        </div>
      </div>

      <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;-webkit-overflow-scrolling:touch;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <button id="btn" onclick="doRefresh()" style="flex:1;min-width:140px;background:#00ff88;color:#000;border:none;padding:13px 20px;font-weight:800;font-size:13px;letter-spacing:1.5px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Oswald',sans-serif;min-height:48px;-webkit-tap-highlight-color:transparent;">⚡ REFRESH NOW</button>
          <label style="display:flex;align-items:center;gap:8px;color:#444;font-size:11px;font-weight:700;cursor:pointer;user-select:none;padding:13px 14px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;min-height:48px;-webkit-tap-highlight-color:transparent;">
            <input id="chk" type="checkbox" onchange="toggleAuto(this.checked)" style="accent-color:#00ff88;width:16px;height:16px;"> AUTO (2M)
          </label>
        </div>

        <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;">
          <span style="font-size:9px;color:#2a2a2a;font-weight:700;letter-spacing:1px;margin-right:2px;">SOURCES:</span>
          ${SOURCE_LABELS.map(s=>`<span style="font-size:8px;font-weight:700;color:#2a2a2a;background:#0d0d0d;border:1px solid #1a1a1a;padding:2px 6px;border-radius:3px;">${s}</span>`).join('')}
        </div>

        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${Object.entries(BADGE).map(([n,c])=>`<span style="font-size:8px;font-weight:800;color:${c.color};background:${c.color}12;border:1px solid ${c.color}30;padding:3px 7px;border-radius:3px;font-family:'Oswald',sans-serif;">${n}</span>`).join('')}
        </div>

        <div id="err" style="display:none;background:#ff444410;border:1px solid #ff444430;color:#ff6666;padding:12px 14px;font-size:12px;border-radius:6px;font-weight:600;line-height:1.5;"></div>

        <div id="fl" style="display:none;border-radius:8px;overflow:hidden;border:1px solid #1a1a1a;">
          <div style="padding:10px 14px;background:#0d0d0d;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:8px;">
            <span style="color:#00ff88;font-size:10px;font-weight:800;letter-spacing:2px;font-family:'Oswald',sans-serif;">LIVE FEED</span>
            <span id="fc" style="background:#00ff8820;color:#00ff88;border:1px solid #00ff8840;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;"></span>
          </div>
          <div id="fi" style="max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch;"></div>
        </div>
      </div>
    </div>`;
}

/* ── Start ticker ── */
function startTicker(items) {
  const tt = document.getElementById('tt'), tl = document.getElementById('tl');
  if (!tt) return;
  const dur = Math.max(60, items.length * 7);
  tt.innerHTML = [...items,...items].map(tickerItemHTML).join('');
  tt.style.cssText = `display:flex;height:100%;animation:ticker-scroll ${dur}s linear infinite;will-change:transform;`;
  tl.style.display = 'none';
}

/* ── Render feed list ── */
function renderFeed(items) {
  document.getElementById('fi').innerHTML = items.map((it,i)=>{
    const c = BADGE[it.badge]||{color:'#888'};
    return `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-left:3px solid ${c.color};margin-left:4px;margin-bottom:1px;background:${i%2===0?'#0a0a0a':'transparent'};">
      <span style="font-size:8px;font-weight:800;color:${c.color};background:${c.color}18;border:1px solid ${c.color}40;padding:2px 5px;border-radius:3px;flex-shrink:0;margin-top:1px;font-family:'Oswald',sans-serif;">${it.badge}</span>
      <span style="color:#ccc;font-size:12px;font-weight:500;line-height:1.4;">${it.line}</span>
    </div>`;
  }).join('');
  document.getElementById('fc').textContent = items.length + ' ITEMS';
  document.getElementById('fl').style.display = 'block';
}

/* ── Refresh button state ── */
function setBtn(loading) {
  const b = document.getElementById('btn'); if(!b) return;
  if (loading) {
    b.style.cssText += ';background:#1a1a1a;color:#444;cursor:not-allowed;';
    b.innerHTML = '<span style="width:14px;height:14px;border:2px solid #333;border-top-color:#555;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;"></span> UPDATING...';
    b.disabled = true;
  } else {
    b.style.cssText += ';background:#00ff88;color:#000;cursor:pointer;';
    b.innerHTML = '⚡ REFRESH NOW';
    b.disabled = false;
  }
}

/* ── Main refresh ── */
let autoTimer = null;
async function doRefresh() {
  setBtn(true);
  const err = document.getElementById('err'); if(err) err.style.display='none';
  try {
    const [scores, rankings, news] = await Promise.all([fetchScores(), fetchRankings(), fetchNews()]);
    const all = sortItems([...scores, ...rankings, ...news]);
    if (!all.length) { if(err){err.textContent='Could not load data — check your connection.';err.style.display='block';} setBtn(false); return; }
    startTicker(all);
    renderFeed(all);
    const ts = document.getElementById('ts'); if(ts) ts.textContent = 'UPDATED ' + new Date().toLocaleTimeString();
  } catch(e) {
    if(err){err.textContent='Error: '+e.message;err.style.display='block';}
  }
  setBtn(false);
}

function toggleAuto(on) {
  clearInterval(autoTimer);
  if (on) autoTimer = setInterval(doRefresh, 120000);
}

buildUI();
doRefresh();
</script>
</body>
</html>
