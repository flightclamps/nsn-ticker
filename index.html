<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>NSN AI · SportsCenter Ticker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,800;0,900;1,900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: #050505;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      -webkit-text-size-adjust: 100%;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px #00ff88; }
      50%       { opacity: 0.35; box-shadow: none; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes flash-badge {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }
    @keyframes slide-down {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Badge config ── */
    const BADGE = {
      LIVE:      { color: '#00ff88', flash: true  },
      FINAL:     { color: '#aaaaaa', flash: false },
      TONIGHT:   { color: '#4488ff', flash: false },
      BREAKING:  { color: '#ff4444', flash: true  },
      PREDICTED: { color: '#bb44ff', flash: false },
      INJURY:    { color: '#ff8800', flash: false },
      ROSTER:    { color: '#00ccaa', flash: false },
      VEGAS:     { color: '#FFD700', flash: false },
      WATCH:     { color: '#ffcc00', flash: false },
      WEATHER:   { color: '#44aaff', flash: false },
      REVENGE:   { color: '#ff6644', flash: false },
      DFS:       { color: '#00cc66', flash: false },
      ROOKIE:    { color: '#00eeff', flash: false },
      SLUMP:     { color: '#ff3333', flash: false },
      HOT:       { color: '#ff6600', flash: true  },
    };
    const DEFAULT_BADGE = { color: '#888', flash: false };

    /* ── System prompt ── */
    const SYSTEM_PROMPT = `You are the ESPN SportsCenter bottom ticker — an elite, unbiased sports intelligence engine. You think like a Vegas sharp, analyze like a quant, and deliver like a broadcaster. You pull data from RotoWire, ESPN, CBS Sports, Baseball Savant, Baseball Reference, DraftKings, and FanDuel to generate the most informed ticker in sports.

Return ONLY a raw JSON array of 20-25 items. No markdown. No explanation. No code fences. Raw JSON array only.

Each item must follow this exact format:
{ "badge": "BADGE_TYPE", "line": "TICKER TEXT IN ALL CAPS — MAX 15 WORDS" }

BADGE OPTIONS (use exactly as written):
LIVE · FINAL · TONIGHT · BREAKING · PREDICTED · INJURY · ROSTER · VEGAS · WATCH · WEATHER · REVENGE · DFS · ROOKIE · SLUMP · HOT

SCORING & PREDICTIONS:
- PREDICTED items must cite at minimum TWO of: L5/L10 average, opponent defensive rank, rest days, home/away split, RotoWire projection, ESPN BPI, or Vegas line
- If Vegas line and stats AGREE → badge: PREDICTED, note HIGH CONFIDENCE
- If Vegas line and stats DISAGREE → badge: WATCH, flag the conflict explicitly
- Back to back flag: any player on second night of B2B gets a performance warning
- Days of rest: 3+ days rest in NBA = scoring upside, flag it
- Home/away splits: call out players who are drastically different home vs away
- Pitcher vs batter handedness: flag lefty/lefty or righty/righty mismatches in MLB
- Barrel rate and exit velocity from Baseball Savant: high barrel % vs soft pitcher = predicted HR

INJURY INTEL:
- Pull latest RotoWire injury reports — flag any upgrade or downgrade since morning
- If a starter is out, identify the replacement and their stats in that role
- Questionable players get flagged until confirmed in/out

VEGAS INTEL:
- Line movement of 2+ points = VEGAS badge, identify which side sharp money is on
- If public % and sharp % disagree, flag it
- Fade the public plays when sharp money is on the other side

CONTEXTUAL BADGES:
- REVENGE: player facing former team → pull their career stats vs that franchise
- WEATHER: outdoor stadiums → wind speed and direction, temp below 50°F, rain delay risk
- ROOKIE: first career game in this stadium or vs this pitcher → note the unknown factor
- DFS: low ownership + high upside = DFS badge with ownership % and reasoning
- SLUMP: player in 0-for-15 or sub .200 L10 → call it out, no bias

FORMATTING RULES:
- ALL CAPS always
- Score first, context second, source or stat third
- Max 15 words per line — tight like a real ticker
- No hype, no bias, no favorite teams — cold numbers only
- If a player is struggling, say it. If a team is overrated, say it.
- Cover NBA, MLB, NFL news, and DFS across the 20-25 items`;

    function buildUserPrompt(date) {
      return `Tonight: ${date}\n\nGenerate the full 20-25 item SportsCenter ticker for tonight based on the most current available data for this date. Use your knowledge of tonight's schedule, injuries, Vegas lines, and player trends.`;
    }

    /* ── Single ticker item ── */
    function TickerItem({ badge, line }) {
      const cfg = BADGE[badge] || DEFAULT_BADGE;
      return (
        <div style={{
          display: 'flex', alignItems: 'center',
          height: '100%', padding: '0 20px',
          borderRight: '1px solid #1a1a1a',
          gap: '12px', flexShrink: 0, whiteSpace: 'nowrap',
        }}>
          <span style={{
            fontSize: '10px', fontWeight: 800, letterSpacing: '0.5px',
            color: cfg.color, backgroundColor: cfg.color + '1a',
            border: `1px solid ${cfg.color}55`, padding: '3px 8px', borderRadius: '3px',
            animation: cfg.flash ? 'flash-badge 1.2s ease-in-out infinite' : 'none',
            fontFamily: "'Oswald', sans-serif",
          }}>{badge}</span>
          <span style={{ fontSize: '13px', fontWeight: 600, color: '#e8e8e8', letterSpacing: '0.2px' }}>
            {line}
          </span>
          <span style={{ color: '#2a2a2a', fontSize: '16px' }}>·</span>
        </div>
      );
    }

    /* ── Ticker bar ── */
    function TickerBar({ items, loading }) {
      const doubled = items.length > 0 ? [...items, ...items] : [];
      const duration = Math.max(60, items.length * 7);
      return (
        <div style={{
          height: '52px', backgroundColor: '#000',
          borderBottom: '3px solid #00ff88',
          display: 'flex', overflow: 'hidden', flexShrink: 0,
        }}>
          {/* Brand */}
          <div style={{
            width: '110px', flexShrink: 0, display: 'flex', alignItems: 'center',
            justifyContent: 'center', gap: '8px', backgroundColor: '#000',
            borderRight: '3px solid #00ff88', boxShadow: '6px 0 20px rgba(0,0,0,0.9)', zIndex: 10,
          }}>
            <div style={{
              width: '7px', height: '7px', borderRadius: '50%',
              backgroundColor: '#00ff88', animation: 'pulse-dot 2s ease-in-out infinite',
            }} />
            <span style={{ fontWeight: 900, fontStyle: 'italic', fontSize: '16px', letterSpacing: '-1px' }}>
              NSN <span style={{ color: '#00ff88' }}>AI</span>
            </span>
          </div>
          {/* Track */}
          <div style={{ flex: 1, overflow: 'hidden', position: 'relative', display: 'flex', alignItems: 'center' }}>
            <div style={{
              position: 'absolute', right: 0, top: 0, bottom: 0, width: '60px',
              background: 'linear-gradient(to right, transparent, #000)',
              pointerEvents: 'none', zIndex: 5,
            }} />
            {loading && items.length === 0 ? (
              <div style={{ padding: '0 20px', color: '#444', display: 'flex', alignItems: 'center', gap: '10px', fontSize: '12px', fontWeight: 600 }}>
                <div style={{
                  width: '13px', height: '13px', border: '2px solid #222', borderTopColor: '#00ff88',
                  borderRadius: '50%', animation: 'spin 0.8s linear infinite',
                }} />
                GROK FETCHING LIVE SPORTS DATA...
              </div>
            ) : items.length > 0 ? (
              <div style={{
                display: 'flex', height: '100%',
                animation: `ticker-scroll ${duration}s linear infinite`,
                willChange: 'transform',
              }}>
                {doubled.map((item, i) => <TickerItem key={i} badge={item.badge} line={item.line} />)}
              </div>
            ) : (
              <div style={{ padding: '0 20px', color: '#2a2a2a', fontSize: '11px', fontWeight: 700, letterSpacing: '1px' }}>
                TAP ⚡ REFRESH TO LOAD TICKER
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ── Feed list ── */
    function FeedList({ items }) {
      if (!items.length) return null;
      return (
        <div style={{ borderRadius: '8px', overflow: 'hidden', border: '1px solid #1a1a1a' }}>
          <div style={{
            padding: '10px 14px', background: '#0d0d0d', borderBottom: '1px solid #1a1a1a',
            display: 'flex', alignItems: 'center', gap: '8px',
          }}>
            <span style={{ color: '#00ff88', fontSize: '10px', fontWeight: 800, letterSpacing: '2px', fontFamily: "'Oswald', sans-serif" }}>
              LIVE FEED
            </span>
            <span style={{
              background: '#00ff8820', color: '#00ff88', border: '1px solid #00ff8840',
              fontSize: '9px', fontWeight: 700, padding: '2px 6px', borderRadius: '10px',
            }}>{items.length} ITEMS</span>
          </div>
          <div style={{ maxHeight: '55vh', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
            {items.map((item, i) => {
              const cfg = BADGE[item.badge] || DEFAULT_BADGE;
              return (
                <div key={i} style={{
                  display: 'flex', alignItems: 'flex-start', gap: '10px',
                  padding: '10px 14px', borderLeft: `3px solid ${cfg.color}`,
                  marginLeft: '4px', marginBottom: '1px',
                  background: i % 2 === 0 ? '#0a0a0a' : 'transparent',
                }}>
                  <span style={{
                    fontSize: '8px', fontWeight: 800, color: cfg.color,
                    background: cfg.color + '18', border: `1px solid ${cfg.color}40`,
                    padding: '2px 5px', borderRadius: '3px', flexShrink: 0, marginTop: '1px',
                    fontFamily: "'Oswald', sans-serif", letterSpacing: '0.3px',
                  }}>{item.badge}</span>
                  <span style={{ color: '#ccc', fontSize: '12px', fontWeight: 500, lineHeight: 1.4 }}>
                    {item.line}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ── Main App ── */
    function App() {
      const [apiKey, setApiKey]           = useState(() => localStorage.getItem('nsn_xai_key') || '');
      const [apiKeyInput, setApiKeyInput] = useState('');
      const [showKeyPanel, setShowKeyPanel] = useState(false);
      const [items, setItems]             = useState([]);
      const [loading, setLoading]         = useState(false);
      const [error, setError]             = useState('');
      const [lastUpdate, setLastUpdate]   = useState(null);
      const [autoRefresh, setAutoRefresh] = useState(false);
      const intervalRef = useRef(null);

      const today = new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
      });

      const fetchTicker = useCallback(async () => {
        const key = apiKey || localStorage.getItem('nsn_xai_key');
        if (!key) { setShowKeyPanel(true); setError('Add your xAI API key first.'); return; }
        setLoading(true);
        setError('');
        try {
          const res = await fetch('https://api.x.ai/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${key}`,
            },
            body: JSON.stringify({
              model: 'grok-3',
              max_tokens: 4096,
              messages: [
                { role: 'system', content: SYSTEM_PROMPT },
                { role: 'user',   content: buildUserPrompt(today) },
              ],
            }),
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err?.error?.message || `HTTP ${res.status}`);
          }

          const data = await res.json();
          const raw = data?.choices?.[0]?.message?.content || '';
          const cleaned = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
          const parsed = JSON.parse(cleaned);
          if (!Array.isArray(parsed)) throw new Error('Response was not a JSON array');

          const validated = parsed
            .filter(x => x && typeof x.badge === 'string' && typeof x.line === 'string')
            .map(x => ({ badge: x.badge.toUpperCase().trim(), line: x.line.toUpperCase().trim() }));

          setItems(validated);
          setLastUpdate(new Date());
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, [apiKey, today]);

      useEffect(() => {
        if (intervalRef.current) clearInterval(intervalRef.current);
        if (autoRefresh) intervalRef.current = setInterval(fetchTicker, 2 * 60 * 1000);
        return () => clearInterval(intervalRef.current);
      }, [autoRefresh, fetchTicker]);

      function saveKey() {
        const k = apiKeyInput.trim();
        if (!k) return;
        localStorage.setItem('nsn_xai_key', k);
        setApiKey(k);
        setApiKeyInput('');
        setShowKeyPanel(false);
        setError('');
      }

      function clearKey() {
        localStorage.removeItem('nsn_xai_key');
        setApiKey('');
        setShowKeyPanel(false);
      }

      const hasKey = !!apiKey;

      return (
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh', background: '#050505' }}>

          {/* ── HEADER ── */}
          <div style={{
            padding: '12px 16px',
            background: '#000',
            borderBottom: '1px solid #111',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            flexShrink: 0,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
              <span style={{ fontWeight: 900, fontStyle: 'italic', fontSize: '20px', letterSpacing: '-1px' }}>
                NSN <span style={{ color: '#00ff88' }}>AI</span>
              </span>
              <span style={{ fontSize: '9px', fontWeight: 700, color: '#333', letterSpacing: '1.5px', fontFamily: "'Oswald', sans-serif" }}>
                TICKER ENGINE
              </span>
            </div>
            {/* Key button */}
            <button
              onClick={() => setShowKeyPanel(v => !v)}
              style={{
                background: hasKey ? '#00ff8818' : '#ff444418',
                border: `1px solid ${hasKey ? '#00ff8840' : '#ff444440'}`,
                color: hasKey ? '#00ff88' : '#ff4444',
                borderRadius: '6px', padding: '8px 14px',
                fontSize: '11px', fontWeight: 800, letterSpacing: '0.5px',
                cursor: 'pointer', fontFamily: "'Oswald', sans-serif",
                WebkitTapHighlightColor: 'transparent', minHeight: '36px',
              }}
            >{hasKey ? '🔑 KEY SET' : '🔑 ADD KEY'}</button>
          </div>

          {/* ── KEY PANEL ── */}
          {showKeyPanel && (
            <div style={{
              background: '#080808', borderBottom: '1px solid #1a1a1a',
              padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: '10px',
              animation: 'slide-down 0.15s ease', flexShrink: 0,
            }}>
              <span style={{ fontSize: '11px', color: '#555', fontWeight: 700, letterSpacing: '1px' }}>
                XAI (GROK) API KEY
              </span>
              <input
                type="password"
                inputMode="text"
                value={apiKeyInput}
                onChange={e => setApiKeyInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && saveKey()}
                placeholder="xai-..."
                autoFocus
                style={{
                  background: '#111', border: '1px solid #2a2a2a',
                  color: '#fff', padding: '11px 14px', borderRadius: '6px',
                  fontSize: '14px', outline: 'none', fontFamily: 'monospace',
                  width: '100%', WebkitAppearance: 'none',
                }}
              />
              <div style={{ display: 'flex', gap: '10px' }}>
                <button onClick={saveKey} style={{
                  flex: 1, background: '#00ff88', color: '#000', border: 'none',
                  padding: '11px', fontWeight: 800, fontSize: '13px', letterSpacing: '1px',
                  cursor: 'pointer', borderRadius: '6px', fontFamily: "'Oswald', sans-serif",
                  minHeight: '44px', WebkitTapHighlightColor: 'transparent',
                }}>SAVE KEY</button>
                {hasKey && (
                  <button onClick={clearKey} style={{
                    background: '#ff444418', color: '#ff4444', border: '1px solid #ff444430',
                    padding: '11px 18px', fontWeight: 700, fontSize: '12px',
                    cursor: 'pointer', borderRadius: '6px', fontFamily: "'Oswald', sans-serif",
                    minHeight: '44px', WebkitTapHighlightColor: 'transparent',
                  }}>CLEAR</button>
                )}
              </div>
            </div>
          )}

          {/* ── TICKER BAR ── */}
          <TickerBar items={items} loading={loading} />

          {/* ── BODY ── */}
          <div style={{ flex: 1, padding: '16px', display: 'flex', flexDirection: 'column', gap: '14px', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>

            {/* Toolbar */}
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flexWrap: 'wrap' }}>
              <button
                onClick={fetchTicker}
                disabled={loading}
                style={{
                  flex: 1, minWidth: '140px', background: loading ? '#1a1a1a' : '#00ff88',
                  color: loading ? '#444' : '#000', border: 'none',
                  padding: '13px 20px', fontWeight: 800, fontSize: '13px',
                  letterSpacing: '1.5px', cursor: loading ? 'not-allowed' : 'pointer',
                  borderRadius: '6px', display: 'flex', alignItems: 'center',
                  justifyContent: 'center', gap: '8px',
                  fontFamily: "'Oswald', sans-serif", minHeight: '48px',
                  WebkitTapHighlightColor: 'transparent',
                }}
              >
                {loading ? (
                  <>
                    <span style={{
                      width: '14px', height: '14px', border: '2px solid #333', borderTopColor: '#555',
                      borderRadius: '50%', animation: 'spin 0.8s linear infinite', display: 'inline-block',
                    }} />
                    UPDATING...
                  </>
                ) : '⚡ REFRESH NOW'}
              </button>

              <label style={{
                display: 'flex', alignItems: 'center', gap: '8px', color: '#444',
                fontSize: '11px', fontWeight: 700, cursor: 'pointer', userSelect: 'none',
                padding: '13px 14px', background: '#0d0d0d', border: '1px solid #1a1a1a',
                borderRadius: '6px', minHeight: '48px', WebkitTapHighlightColor: 'transparent',
              }}>
                <input
                  type="checkbox"
                  checked={autoRefresh}
                  onChange={e => setAutoRefresh(e.target.checked)}
                  style={{ accentColor: '#00ff88', width: '16px', height: '16px' }}
                />
                AUTO (2M)
              </label>
            </div>

            {/* Timestamp */}
            {lastUpdate && (
              <div style={{ fontSize: '10px', color: '#2a2a2a', fontWeight: 700, letterSpacing: '0.5px' }}>
                UPDATED {lastUpdate.toLocaleTimeString()}
              </div>
            )}

            {/* Error */}
            {error && (
              <div style={{
                background: '#ff444410', border: '1px solid #ff444430',
                color: '#ff6666', padding: '12px 14px', fontSize: '12px',
                borderRadius: '6px', fontWeight: 600, lineHeight: 1.5,
              }}>{error}</div>
            )}

            {/* Badge legend */}
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
              {Object.entries(BADGE).map(([name, cfg]) => (
                <span key={name} style={{
                  fontSize: '8px', fontWeight: 800, color: cfg.color,
                  background: cfg.color + '12', border: `1px solid ${cfg.color}30`,
                  padding: '3px 7px', borderRadius: '3px', letterSpacing: '0.3px',
                  fontFamily: "'Oswald', sans-serif",
                }}>{name}</span>
              ))}
            </div>

            {/* Feed */}
            <FeedList items={items} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
